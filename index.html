<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="config.js"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: monospace; color: #00d2ff; }
        canvas { position: absolute; top: 0; left: 0; }
        .ui { position: absolute; padding: 20px; z-index: 5; font-size: 10px; pointer-events: none; }
        #cmd { position: absolute; bottom: 100px; width: 100%; text-align: center; color: #05ffa1; z-index: 10; font-size: 18px; text-shadow: 0 0 10px #05ffa1; }
        #btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: none; border: 1px solid #00d2ff; color: #00d2ff; padding: 12px 25px; z-index: 15; cursor: pointer; }
    </style>
</head>
<body>
    <div class="ui">[ JARVIS AI CORE ]<br>STATUS: <span id="st">READY</span></div>
    <div id="cmd">TIZIMNI YOQING</div>
    <button id="btn" onclick="init()">START SYSTEM</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let frame = 0, volume = 0, analyzer, micOn = false;

        async function askAI(text) {
            document.getElementById('cmd').innerText = "JARVIS O'YLAMOQDA...";
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.API_KEY}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: "Sen Jarvis yordamchisisan. Qisqa va aqlli javob ber: " + text}]}]})
                });
                const d = await r.json();
                const res = d.candidates[0].content.parts[0].text;
                speak(res);
                document.getElementById('cmd').innerText = res;
            } catch(e) { document.getElementById('cmd').innerText = "API KEY XATO!"; }
        }

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Speech();
        rec.lang = 'uz-UZ'; rec.continuous = true;
        rec.onresult = (e) => {
            const m = e.results[e.results.length-1][0].transcript.toLowerCase();
            document.getElementById('cmd').innerText = "SIZ: " + m;
            if(m.includes("chiroqni yoq")) { JarvisOS.setFlash(true); speak("Xo'p bo'ladi"); }
            else if(m.includes("chiroqni o'chir")) { JarvisOS.setFlash(false); speak("O'chirildi"); }
            else if(m.includes("batareya")) speak("Quvvat darajasi " + JarvisOS.getBattery() + " foiz");
            else askAI(m);
        };

        function speak(t) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }

        async function init() {
            const s = await navigator.mediaDevices.getUserMedia({audio:true});
            const ac = new AudioContext();
            analyzer = ac.createAnalyser();
            ac.createMediaStreamSource(s).connect(analyzer);
            rec.start();
            micOn = true;
            document.getElementById('btn').style.display = 'none';
            document.getElementById('st').innerText = "ACTIVE";
            document.getElementById('st').style.color = "#05ffa1";
            animate();
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width/2, cy = canvas.height/2; frame++;
            if(analyzer) {
                const d = new Uint8Array(analyzer.frequencyBinCount);
                analyzer.getByteFrequencyData(d);
                volume = d.reduce((a,b)=>a+b)/d.length;
            }
            for(let i=0; i<15; i++) {
                ctx.beginPath();
                let r = 130 + Math.sin(frame*0.02+i)*10 + volume;
                let rx = Math.cos(frame*0.01+i)*(80+volume);
                ctx.ellipse(cx, cy, r, Math.abs(rx), (frame*0.01)+i, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(0, 210, 255, ${0.1 + i*0.03})`;
                ctx.stroke();
            }
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
