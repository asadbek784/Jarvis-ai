<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Master Core</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #00d2ff; }
        canvas { position: absolute; top: 0; left: 0; }
        
        .ui { position: absolute; width: 100%; height: 100%; pointer-events: none; padding: 15px; box-sizing: border-box; z-index: 5; font-size: 10px; }
        .cmd-display { position: absolute; bottom: 80px; width: 100%; text-align: center; font-size: 14px; text-transform: uppercase; text-shadow: 0 0 10px #05ffa1; letter-spacing: 2px; z-index: 10; color: #05ffa1; }
        
        #start-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: none; border: 1px solid #00d2ff; color: #00d2ff; padding: 12px 25px; z-index: 15; cursor: pointer; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        #start-btn:active { background: rgba(0, 210, 255, 0.2); }
        
        #settings-panel { display: none; position: absolute; top: 60px; right: 20px; background: rgba(0, 10, 20, 0.95); border: 1px solid #00d2ff; padding: 20px; color: white; z-index: 100; border-radius: 10px; width: 220px; box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }
        #settings-toggle { position: absolute; top: 20px; right: 20px; z-index: 100; cursor: pointer; font-size: 12px; border: 1px solid #00d2ff; padding: 5px 10px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="ui">
        <div style="float: left;">[ NEURAL_LINK v12.0 ]<br>SYSTEM_STATE: <span id="status">STANDBY</span></div>
        <div style="float: right; text-align: right;">LOCATION: GULISTAN<br>LINK: SECURE</div>
    </div>

    <div id="settings-toggle" onclick="toggleSettings()">⚙️ NASTROYKA</div>
    <div id="settings-panel">
        <h4 style="margin-top: 0; text-align: center; border-bottom: 1px solid #00d2ff; padding-bottom: 5px;">TIZIM NAZORATI</h4>
        <label><input type="checkbox" id="voice-reply" checked> Ovozli javob</label><br><br>
        <label><input type="checkbox" id="flash-control" checked> Fonus ruxsati</label><br><br>
        <label><input type="checkbox" id="app-control" checked> Ilova ruxsati</label><br><br>
        <label><input type="checkbox" id="visual-fx" checked> Animatsiya</label><br><br>
        <button onclick="toggleSettings()" style="width: 100%; background: #00d2ff; border: none; padding: 8px; color: #000; cursor: pointer; font-weight: bold;">SAQLASH</button>
    </div>

    <div id="cmd-display" class="cmd-display">TIZIMNI FAOLLASHTIRING</div>
    <button id="start-btn">JARVISNI YOQISH</button>
    
    <canvas id="jarvisCanvas"></canvas>

    <script>
        const canvas = document.getElementById('jarvisCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const cmdDisplay = document.getElementById('cmd-display');
        const vStatus = document.getElementById('status');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let frame = 0, analyzer, dataArray, volume = 0, micStarted = false;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'uz-UZ';
            recognition.continuous = true;

            recognition.onstart = () => {
                vStatus.innerText = "ACTIVE";
                vStatus.style.color = "#05ffa1";
                cmdDisplay.innerText = "Sizni eshityapman, Ser...";
            };

            recognition.onresult = (event) => {
                const command = event.results[event.results.length - 1][0].transcript.toLowerCase();
                cmdDisplay.innerText = "Siz: " + command;
                executeCommand(command);
            };

            function executeCommand(cmd) {
                const voiceOn = document.getElementById('voice-reply').checked;
                const flashOn = document.getElementById('flash-control').checked;
                const appOn = document.getElementById('app-control').checked;

                if (cmd.includes("salom")) {
                    speak("Salom Ser, barcha tizimlar faol.", voiceOn);
                } else if (cmd.includes("chiroqni yoq")) {
                    if(flashOn) { JarvisOS.setFlash(true); speak("Chiroq yoqildi.", voiceOn); }
                } else if (cmd.includes("chiroqni o'chir")) {
                    JarvisOS.setFlash(false); speak("O'chirildi.", voiceOn);
                } else if (cmd.includes("batareya") || cmd.includes("quvvat")) {
                    speak("Ser, quvvat darajasi " + JarvisOS.getBattery() + " foiz.", voiceOn);
                } else if (cmd.includes("telegram")) {
                    if(appOn) { speak("Telegram ochilmoqda.", voiceOn); JarvisOS.openApp("org.telegram.messenger"); }
                } else if (cmd.includes("youtube")) {
                    if(appOn) { speak("YouTube ishga tushirildi.", voiceOn); JarvisOS.openApp("com.google.android.youtube"); }
                }
            }

            function speak(text, enabled) {
                if(!enabled) return;
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'uz-UZ';
                window.speechSynthesis.speak(utter);
            }

            startBtn.onclick = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyzer = audioCtx.createAnalyser();
                    audioCtx.createMediaStreamSource(stream).connect(analyzer);
                    analyzer.fftSize = 256;
                    dataArray = new Uint8Array(analyzer.frequencyBinCount);
                    recognition.start();
                    micStarted = true;
                    startBtn.style.display = 'none';
                } catch(e) { alert("Xato: Mikrofon ruxsati kerak!"); }
            };
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            frame++;

            if (micStarted && analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                volume = (sum / dataArray.length) * 0.6;
            }

            const visualOn = document.getElementById('visual-fx').checked;
            if(visualOn) {
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 15; i++) {
                    ctx.beginPath();
                    let r = 130 + Math.sin(frame * 0.015 + i) * 10 + volume;
                    let rx = Math.cos(frame * 0.01 + i) * (80 + volume * 0.5);
                    ctx.ellipse(cx, cy, r, Math.abs(rx), (frame * 0.008) + i, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(0, 210, 255, ${0.05 + (i * 0.025)})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                let coreR = 40 + (volume * 0.4);
                let grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
                grad.addColorStop(0, '#fff');
                grad.addColorStop(0.5, 'rgba(0, 210, 255, 0.5)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
